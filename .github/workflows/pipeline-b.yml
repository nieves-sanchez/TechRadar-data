# .github/workflows/pipeline-b.yml
#
# Pipeline B v1 — Enriquecimiento de description_full
#
# Independiente del pipeline ETL principal (pipeline.yml). Recorre las ofertas
# activas con URL /details/ pero sin description_full y reintenta el crawling
# usando scripts.repair_crawl. Las URLs /land/ quedan excluidas en la propia
# query (0% de éxito histórico — ver scripts/repair_crawl.py _fetch_pending).
#
# MODO MANTENIMIENTO (validado): cron diario a las 11:00 UTC, ~5h después de
# Pipeline A (06:00 UTC). En ejecución programada usa defaults fijos
# (limit=3000, delay=1.5, since_days=2) para enriquecer solo el inflow reciente
# sin re-procesar la cola dura histórica. Sigue disponible la ejecución manual
# (workflow_dispatch) con inputs personalizados.
#
# Secretos necesarios (Settings → Secrets and variables → Actions):
#   DATABASE_URL — connection string de Supabase PostgreSQL

name: Pipeline B - Description Enrichment

on:
  # Ejecución automática diaria: 11:00 UTC (~5h tras Pipeline A, 06:00 UTC).
  # En este trigger NO hay inputs: el step de args usa defaults fijos de
  # mantenimiento (limit=3000, delay=1.5, since_days=2, country=todos).
  schedule:
    - cron: "0 11 * * *"

  # Ejecución manual con inputs personalizados desde la UI de GitHub Actions.
  workflow_dispatch:
    inputs:
      limit:
        description: "Máximo de ofertas a procesar en este run"
        required: false
        default: "100"
        type: string
      delay:
        description: "Segundos de pausa entre peticiones (2.0 = conservador, 1.5 = recomendado /details/)"
        required: false
        default: "1.5"
        type: string
      country:
        description: "Filtrar por país (ej: pl, de, fr). Vacío = todos."
        required: false
        default: ""
        type: string
      since_days:
        description: "Solo ofertas posted_at en los últimos N días (evita la cola dura histórica). 0 = sin filtro temporal."
        required: false
        default: "0"
        type: string

jobs:
  enrich-descriptions:
    name: Crawl description_full (/details/)
    runs-on: ubuntu-latest
    # Hard limit de 6h: es el máximo de GitHub Actions en plan free. El circuit
    # breaker del script para antes si hay throttling sostenido.
    timeout-minutes: 360
    # Grupo de concurrencia propio, distinto del de Pipeline A (techradar-pipeline).
    # Así un run de B no bloquea ni es bloqueado por A. No se cancelan runs en curso:
    # perder trabajo de crawling ya hecho es peor que esperar.
    concurrency:
      group: techradar-pipeline-b
      cancel-in-progress: false

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Instalar Python 3.12 (misma versión que Pipeline A)
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Caché de dependencias pip (se invalida al cambiar requirements.txt)
      - name: Caché de dependencias pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Instalar dependencias del proyecto
      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # 5. Construir los argumentos de repair_crawl según el tipo de trigger.
      #    - schedule (cron diario): defaults fijos de mantenimiento. Los inputs
      #      NO existen en ejecución programada, por eso no se leen aquí.
      #    - workflow_dispatch (manual): usa los inputs del formulario.
      #    --country solo se añade si no está vacío; --since-days solo si es > 0.
      - name: Construir argumentos
        id: args
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            LIMIT="3000"; DELAY="1.5"; COUNTRY=""; SINCE="2"
          else
            LIMIT="${{ github.event.inputs.limit }}"
            DELAY="${{ github.event.inputs.delay }}"
            COUNTRY="${{ github.event.inputs.country }}"
            SINCE="${{ github.event.inputs.since_days }}"
          fi

          ARGS="--limit $LIMIT --delay $DELAY"
          if [ -n "$COUNTRY" ]; then
            ARGS="$ARGS --country $COUNTRY"
          fi
          if [ -n "$SINCE" ] && [ "$SINCE" -gt 0 ] 2>/dev/null; then
            ARGS="$ARGS --since-days $SINCE"
          fi
          echo "repair_args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "Argumentos: $ARGS"

      # 6. Ejecutar el enriquecimiento de descripciones
      - name: Ejecutar Pipeline B (repair_crawl)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m scripts.repair_crawl ${{ steps.args.outputs.repair_args }}

# =============================================================================
# NOTA: el cron diario (11:00 UTC) quedó ACTIVADO tras validar la Fase C
# (run since_days=2: 1421/1432 actualizadas, 99,2%, 46m). Los defaults de
# mantenimiento se fijan en el step "Construir argumentos" para el trigger
# schedule. Para cambiarlos, editar ese step (no hay inputs en ejecución cron).
# =============================================================================
